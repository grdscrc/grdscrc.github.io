<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Dés Audio</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0f0f1a;
      --surface:   #1a1a2e;
      --border:    #3b2f6e;
      --accent:    #a855f7;
      --accent2:   #e879f9;
      --text:      #e2e8f0;
      --muted:     #64748b;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 28px 16px 40px;
      gap: 20px;
    }

    h1 {
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--accent);
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    /* ── Result panel ── */
    .result-panel {
      background: var(--surface);
      border: 2px solid var(--border);
      border-radius: 20px;
      padding: 22px 28px 18px;
      text-align: center;
      width: 100%;
      max-width: 360px;
      transition: border-color 0.2s;
    }

    .result-panel.active {
      border-color: var(--accent);
      box-shadow: 0 0 24px #a855f730;
    }

    .result-panel.critical-fail {
      border-color: #ef4444;
      box-shadow: 0 0 32px #ef444440;
      animation: shake 0.4s ease;
    }

    .result-panel.critical-success {
      border-color: #fbbf24;
      box-shadow: 0 0 40px #fbbf2450;
      animation: glow-pulse 0.6s ease-in-out 2;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20%       { transform: translateX(-6px); }
      40%       { transform: translateX(6px); }
      60%       { transform: translateX(-4px); }
      80%       { transform: translateX(4px); }
    }

    @keyframes glow-pulse {
      0%, 100% { box-shadow: 0 0 40px #fbbf2450; }
      50%       { box-shadow: 0 0 70px #fbbf2490; }
    }

    .result-value.critical-fail  { color: #f87171; }
    .result-value.critical-success { color: #fcd34d; }

    .result-label {
      font-size: 0.75rem;
      color: var(--accent);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      min-height: 1rem;
    }

    .result-value {
      font-size: 5rem;
      font-weight: 800;
      line-height: 1.05;
      min-height: 5.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--accent2);
      transition: color 0.2s;
    }

    .result-value.rolling {
      color: var(--accent);
      animation: flicker 0.08s infinite;
    }

    @keyframes flicker {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.25; }
    }

    /* ── Dice grid ── */
    .dice-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      width: 100%;
      max-width: 360px;
    }

    .die-btn {
      background: var(--surface);
      border: 2px solid var(--border);
      border-radius: 14px;
      color: var(--text);
      font-size: 1.05rem;
      font-weight: 700;
      padding: 20px 6px;
      cursor: pointer;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.1s, border-color 0.1s, transform 0.1s;
      user-select: none;
    }

    .die-btn:active {
      background: #2d1b69;
      border-color: var(--accent);
      transform: scale(0.93);
    }

    .die-btn.wide {
      grid-column: span 2;
    }

    .die-btn.full {
      grid-column: span 4;
    }

    .die-btn.current {
      font-size: 1.35rem;
      border-color: #6d28d9;
      background: #1e1b4b;
    }

    /* ── Reroll button ── */
    .reroll-btn {
      width: 100%;
      max-width: 360px;
      background: #3b1264;
      border: 2px solid var(--accent);
      border-radius: 14px;
      color: var(--accent2);
      font-size: 1rem;
      font-weight: 600;
      padding: 16px;
      cursor: pointer;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.1s, transform 0.1s;
      opacity: 0;
      pointer-events: none;
    }

    .reroll-btn.visible {
      opacity: 1;
      pointer-events: auto;
    }

    .reroll-btn:active {
      background: #5b21b6;
      transform: scale(0.97);
    }

    .hint {
      font-size: 0.72rem;
      color: var(--muted);
      text-align: center;
      max-width: 280px;
      line-height: 1.5;
    }
  </style>
</head>
<body>

<h1>🎲 Dés Audio</h1>

<div class="result-panel" id="panel">
  <div class="result-label" id="resultLabel">&nbsp;</div>
  <div class="result-value" id="resultValue">?</div>
</div>

<div class="dice-grid">
  <button id="d20" class="die-btn wide" onclick="roll(20)">d20</button>
  <button id="d6" class="die-btn wide" onclick="roll(6)">d6</button>
  <button id="d4" class="die-btn" onclick="roll(4)">d4</button>
  <button id="d8" class="die-btn" onclick="roll(8)">d8</button>
  <button id="d10" class="die-btn" onclick="roll(10)">d10</button>
  <button id="d12" class="die-btn" onclick="roll(12)">d12</button>
  <button id="d100" class="die-btn full" onclick="roll(100)">d100</button>
</div>

<button class="reroll-btn" id="rerollBtn" onclick="reroll()">↺ Relancer le même dé</button>

<p class="hint">Appuie sur un dé — le résultat est annoncé à voix haute</p>

<script>
  /* ── State ── */
  let lastDie   = null;
  let audioCtx  = null;
  let busy      = false;
  let speechReady = false;

  /* ── Unlock iOS speech synthesis (must run in synchronous user gesture) ── */
  function ensureSpeech() {
    if (speechReady || typeof speechSynthesis === 'undefined') return;
    const u = new SpeechSynthesisUtterance('');
    u.volume = 0;
    speechSynthesis.speak(u);
    speechReady = true;
  }

  /* ── Audio context (lazy, requires user gesture) ── */
  function ctx() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
    return audioCtx;
  }

  /* ── Dice rolling sound ── */
  function playRoll(callback) {
    const ac  = ctx();
    const now = ac.currentTime;
    const totalDur = 0.95;
    const nClicks  = 16;

    for (let i = 0; i < nClicks; i++) {
      // Clicks accelerate then decelerate (bell curve timing)
      const progress = i / (nClicks - 1);
      const t = now + totalDur * (1 - Math.pow(1 - progress, 2)) * 0.9;

      // Short noise burst per click
      const len    = Math.floor(ac.sampleRate * 0.045);
      const buf    = ac.createBuffer(1, len, ac.sampleRate);
      const data   = buf.getChannelData(0);
      const decay  = 0.12;
      for (let j = 0; j < len; j++) {
        data[j] = (Math.random() * 2 - 1) * Math.exp(-j / (len * decay));
      }

      const src  = ac.createBufferSource();
      src.buffer = buf;

      // Highpass → crisp "clack"
      const hp  = ac.createBiquadFilter();
      hp.type   = 'highpass';
      hp.frequency.value = 700 + Math.random() * 800;

      // Volume envelope — louder in the middle of the roll
      const env = ac.createGain();
      const vol = 0.15 + 0.4 * Math.sin(Math.PI * progress);
      env.gain.setValueAtTime(vol, t);
      env.gain.exponentialRampToValueAtTime(0.001, t + 0.07);

      src.connect(hp);
      hp.connect(env);
      env.connect(ac.destination);
      src.start(t);
    }

    setTimeout(callback, totalDur * 1000 + 120);
  }

  /* ── Sad trombone (wah-wah-wah-waaah) ── */
  function playSadTrombone() {
    const ac  = ctx();
    const now = ac.currentTime;

    // Classic descending: Bb4 → G4 → Eb4 → C4 (pitch bend down)
    const notes = [
      { freq: 466, start: 0.0,  dur: 0.38 },
      { freq: 392, start: 0.34, dur: 0.38 },
      { freq: 311, start: 0.66, dur: 0.38 },
      { freq: 261, start: 0.98, dur: 1.3  }, // long sad hold + downward bend
    ];

    notes.forEach(({ freq, start, dur }, i) => {
      const osc  = ac.createOscillator();
      osc.type   = 'sawtooth';
      osc.frequency.setValueAtTime(freq, now + start);

      // Last note bends down sadly
      if (i === notes.length - 1) {
        osc.frequency.setValueAtTime(freq, now + start + 0.3);
        osc.frequency.exponentialRampToValueAtTime(freq * 0.82, now + start + dur);
      }

      // Slow vibrato on last note
      if (i === notes.length - 1) {
        const lfo  = ac.createOscillator();
        lfo.type   = 'sine';
        lfo.frequency.value = 4.5;
        const lfoGain = ac.createGain();
        lfoGain.gain.setValueAtTime(0, now + start);
        lfoGain.gain.linearRampToValueAtTime(6, now + start + 0.5);
        lfo.connect(lfoGain);
        lfoGain.connect(osc.frequency);
        lfo.start(now + start);
        lfo.stop(now + start + dur + 0.05);
      }

      // Warm lowpass → muted brass character
      const lp  = ac.createBiquadFilter();
      lp.type   = 'lowpass';
      lp.frequency.value = 1400;
      lp.Q.value = 1.5;

      const gain = ac.createGain();
      gain.gain.setValueAtTime(0, now + start);
      gain.gain.linearRampToValueAtTime(0.28, now + start + 0.04);
      gain.gain.setValueAtTime(0.28, now + start + dur - 0.12);
      gain.gain.exponentialRampToValueAtTime(0.001, now + start + dur);

      osc.connect(lp);
      lp.connect(gain);
      gain.connect(ac.destination);
      osc.start(now + start);
      osc.stop(now + start + dur + 0.05);
    });
  }

  /* ── Heroic trumpet fanfare (ascending + triumphant hold) ── */
  function playHeroicFanfare() {
    const ac  = ctx();
    const now = ac.currentTime;

    // G4 → C5 → E5 → G5 (bugle-style ascending, then hold)
    const notes = [
      { freq: 392, start: 0.0,  dur: 0.18 },
      { freq: 523, start: 0.16, dur: 0.18 },
      { freq: 659, start: 0.32, dur: 0.18 },
      { freq: 784, start: 0.48, dur: 0.85 }, // triumphant!
    ];

    notes.forEach(({ freq, start, dur }, i) => {
      const osc  = ac.createOscillator();
      osc.type   = 'sawtooth';
      osc.frequency.value = freq;

      // Slight upward pitch push at attack (trumpet articulation)
      osc.frequency.setValueAtTime(freq * 1.02, now + start);
      osc.frequency.exponentialRampToValueAtTime(freq, now + start + 0.04);

      // Bright bandpass for trumpet timbre
      const bp  = ac.createBiquadFilter();
      bp.type   = 'bandpass';
      bp.frequency.value = freq * 1.8;
      bp.Q.value = 0.7;

      // Second harmonic layer for richness
      const osc2  = ac.createOscillator();
      osc2.type   = 'square';
      osc2.frequency.value = freq * 2;

      const mixGain = ac.createGain();
      mixGain.gain.value = 0.12;

      const gain = ac.createGain();
      // Punchy attack, then slight decay on held note
      gain.gain.setValueAtTime(0, now + start);
      gain.gain.linearRampToValueAtTime(i === notes.length - 1 ? 0.42 : 0.36, now + start + 0.025);
      if (i === notes.length - 1) {
        gain.gain.setValueAtTime(0.42, now + start + 0.1);
        gain.gain.linearRampToValueAtTime(0.32, now + start + dur - 0.15);
      }
      gain.gain.exponentialRampToValueAtTime(0.001, now + start + dur);

      osc.connect(bp);
      bp.connect(gain);
      osc2.connect(mixGain);
      mixGain.connect(gain);
      gain.connect(ac.destination);

      osc.start(now + start);
      osc.stop(now + start + dur + 0.05);
      osc2.start(now + start);
      osc2.stop(now + start + dur + 0.05);
    });
  }

  /* ── TTS ── */
  function speak(text, critFail, critSuccess) {
    let number = parseInt(text);
    let fetches = [];
    if (number <= 16) {
      fetches.push(fetch(`./assets/audio/${number.toString().padStart(2, '0')}.mp3`));
    } else if (number == 100) {
      fetches.push(fetch(`./assets/audio/100.mp3`));
    } else {
      let tenths = Math.floor(number / 10);
      let units  = number % 10;
      if (number >= 17 && number <= 19) {
        fetches.push(fetch(`./assets/audio/10.mp3`));
        fetches.push(fetch(`./assets/audio/${units.toString().padStart(2, '0')}.mp3`));
      } else if (number >= 20 && number <= 69) {
        fetches.push(fetch(`./assets/audio/${tenths.toString().padEnd(2, '0')}.mp3`));
        if (units == 1) fetches.push(fetch(`./assets/audio/et.mp3`));
        if (units >= 1) fetches.push(fetch(`./assets/audio/${units.toString().padStart(2, '0')}.mp3`));
      } else if (number >= 70 && number <= 79) {
        fetches.push(fetch(`./assets/audio/60.mp3`));
        if (units >= 1 && units <= 6) {
          fetches.push(fetch(`./assets/audio/1${units}.mp3`));
        }
        if (units >= 1 && units >= 7) {
          fetches.push(fetch(`./assets/audio/10.mp3`));
          fetches.push(fetch(`./assets/audio/0${units.toString()}.mp3`));
        }
      } else if (number >= 80 && number <= 99) {
        units = number - 80;
        fetches.push(fetch(`./assets/audio/04.mp3`));
        fetches.push(fetch(`./assets/audio/20.mp3`));
        if (units >= 1 && units <= 16)
          fetches.push(fetch(`./assets/audio/${units.toString().padStart(2, '0')}.mp3`));
        if (units >= 1 && units >= 17) {
          fetches.push(fetch(`./assets/audio/10.mp3`));
          fetches.push(fetch(`./assets/audio/0${units.toString()}.mp3`));
        }
      }
    }

    Promise.all(fetches).then(async responses => {
      // 1. Décoder tous les buffers
      const buffers = await Promise.all(
        responses.map(async r => {
          if (!r.ok) throw new Error(`HTTP ${r.status}`);
          const arr = await r.arrayBuffer();
          return audioCtx.decodeAudioData(arr);
        })
      );

      // 2. Les programmer en séquence
      let t = audioCtx.currentTime;
      for (const buffer of buffers) {
        const source = audioCtx.createBufferSource();
        source.buffer = buffer;
        source.connect(audioCtx.destination);
        source.start(t);
        t += buffer.duration + 0.02; // 40ms de silence entre les mots
      }
    }).catch(err => {
      console.error('Error fetching or playing audio:', err);
      speech(text, critFail, critSuccess);
    });
  }

  function speech(text, critFail, critSuccess) {
    if (critFail) text += ": échec critique !";
    if (critSuccess) text += ": succès critique !";
    const utt  = new SpeechSynthesisUtterance(text);
    utt.lang   = 'fr-FR';
    utt.rate   = 0.88;
    utt.pitch  = 1.05;

    // Pick best French voice if available
    const voices = speechSynthesis.getVoices();
    const best   = voices.find(v => v.lang === 'fr-FR' && v.localService)
                || voices.find(v => v.lang.startsWith('fr-'))
                || voices.find(v => v.lang.startsWith('fr'));
    if (best) utt.voice = best;

    speechSynthesis.cancel();
    speechSynthesis.speak(utt);
  }

  /* ── Scramble animation ── */
  function scramble(finalVal, faces, done) {
    const el     = document.getElementById('resultValue');
    const frames = 14;
    let   count  = 0;
    el.classList.add('rolling');

    const id = setInterval(() => {
      el.textContent = Math.floor(Math.random() * faces) + 1;
      if (++count >= frames) {
        clearInterval(id);
        el.classList.remove('rolling');
        el.textContent = finalVal;
        done && done();
      }
    }, 55);
  }

  /* ── Main roll ── */
  function roll(faces) {
    if (busy) return;
    ensureSpeech(); // doit être appelé ici, synchrone, dans le geste utilisateur
    busy    = true;
    lastDie = faces;

    const result = Math.floor(Math.random() * faces) + 1;

    // Reset UI
    const panel = document.getElementById('panel');
    const valEl = document.getElementById('resultValue');
    panel.className = 'result-panel active';
    valEl.className = 'result-value';
    document.getElementById('resultLabel').textContent = `d${faces}`;
    valEl.textContent = '…';
    document.getElementById('rerollBtn').classList.remove('visible');
    document.querySelectorAll(".die-btn").forEach(d => d.classList.remove('current'))
    document.getElementById(`d${faces}`).classList.add('current');


    const isCritFail    = faces >= 12 && result === 1;
    const isCritSuccess = faces >= 12 && result === faces;

    playRoll(() => {
      scramble(result, faces, () => {
        // Apply critical visual state
        if (isCritFail) {
          panel.classList.add('critical-fail');
          valEl.classList.add('critical-fail');
        } else if (isCritSuccess) {
          panel.classList.add('critical-success');
          valEl.classList.add('critical-success');
        }

        setTimeout(() => {
          speak(String(result), isCritFail, isCritSuccess);

          // Play special jingle after TTS starts
          if (isCritFail)    setTimeout(playSadTrombone,   2000);
          if (isCritSuccess) setTimeout(playHeroicFanfare, 2000);

          document.getElementById('rerollBtn').classList.add('visible');
          busy = false;
        }, 150);
      });
    });
  }

  function reroll() {
    if (lastDie) roll(lastDie);
  }

  /* ── Pre-load voices (browsers load async) ── */
  if (typeof speechSynthesis !== 'undefined') {
    speechSynthesis.getVoices();
    speechSynthesis.addEventListener('voiceschanged', () => speechSynthesis.getVoices());
  }
</script>
</body>
</html>

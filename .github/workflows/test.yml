name: Tests

on:
  pull_request:
  push:
    branches: [master]

jobs:
  unit:
    name: Unit tests
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Run unit tests
      run: node --test

  integration:
    name: Integration tests (A4 layout)
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install dependencies
      run: npm ci

    - name: Start local server
      run: npx serve -p 3456 . &

    - name: Wait for server
      run: npx wait-on http://localhost:3456 --timeout 10000

    - name: Run A4 overflow tests
      run: node integration/a4-overflow.js
